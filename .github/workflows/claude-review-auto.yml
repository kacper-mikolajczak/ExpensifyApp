name: PR Reviews with Claude Code [Auto on Ready]

permissions:
    contents: read
    pull-requests: write

on:
    pull_request_target:
        types: [ready_for_review]

jobs:
    review:
        if: github.event.pull_request.draft != true && !contains(github.event.pull_request.title, 'Revert')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
              with:
                  fetch-depth: 1

            - name: Run Claude Code
              uses: anthropics/claude-code-action@f30f5eecfce2f34fa72e40fa5f7bcdbdcad12eb8 # v1.0.14
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  prompt: "/review-code-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}"
                  claude_args: |
                      --allowedTools "Task,Glob,Grep,Read,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(.github/scripts/addPrReaction.sh:*),mcp__github_inline_comment__create_inline_comment"
                      --system-prompt "CRITICAL INSTRUCTIONS: (1) Read the Output Requirements section of the agent prompt BEFORE doing anything. (2) ONLY use mcp__github_inline_comment__create_inline_comment for violations OR .github/scripts/addPrReaction.sh for no violations. (3) NEVER write summary comments, tables, or explanatory text. (4) If you create any output other than the two allowed methods, you have FAILED. (5) Violating output rules means immediate failure - there are NO exceptions."
